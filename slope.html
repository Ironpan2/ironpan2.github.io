<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        /* Removes default margins and stops scrollbars from appearing */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Deep black background for Slope */
        }
        
        /* Makes the game fill the entire screen seamlessly */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <iframe src="https://slopeonline.online/xlope-game" allow="fullscreen" allowfullscreen></iframe>

</body>
</html>
