<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        /* Base page styling */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: Arial, sans-serif;
            background-color: #111;
            overflow: hidden;
        }
        
        /* The toolbar at the top */
        #toolbar {
            display: flex;
            padding: 10px 20px;
            background-color: #222;
            border-bottom: 2px solid #444;
            align-items: center;
            gap: 15px;
            height: 40px;
            box-sizing: border-box;
        }

        /* The URL input field */
        #toolbar input {
            flex-grow: 1;
            padding: 8px 12px;
            border-radius: 4px;
            border: 1px solid #555;
            background: #333;
            color: white;
            font-size: 14px;
        }

        #toolbar input::placeholder {
            color: #aaa;
        }

        /* The 'Mirror It' button */
        #toolbar button {
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            background: #007bff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #toolbar button:hover {
            background: #0056b3;
        }

        /* The iframe that holds the game */
        iframe {
            width: 100%;
            /* Subtracting the toolbar height so there are no scrollbars */
            height: calc(100% - 40px);
            border: none;
            display: block;
            background-color: #000;
        }
    </style>
</head>
<body>

    <div id="toolbar">
        <input type="text" id="urlInput" placeholder="Paste a game link here (e.g., kirka.io)">
        <button onclick="loadMirror()">UпBl0ck!</button>
    </div>

    <iframe id="gameFrame" src="" allow="fullscreen" allowfullscreen></iframe>

    <script>
        function loadMirror() {
            let url = document.getElementById('urlInput').value.trim();
            
            // If the box is empty, do nothing
            if (!url) return; 
            
            // If the user forgot 'http://' or 'https://', add it for them
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                url = 'https://' + url;
            }
            
            // Load the URL into the iframe
            document.getElementById('gameFrame').src = url;
        }
        
        // Let the user just press 'Enter' instead of clicking the button
        document.getElementById('urlInput').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                loadMirror();
            }
        });
    </script>

</body>
</html>
